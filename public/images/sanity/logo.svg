<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background subtle gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Main Gradient for 'Apex' -->
    <linearGradient id="apex-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <!-- Accent Gradient for line details -->
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Card Background -->
  <rect width="100%" height="100%" rx="16" fill="url(#bg-grad)"/>

  <g transform="translate(100, 65)">
    <!-- Stylized Geometric "A" representing Apex/Peak -->
    <g id="custom-A">
      <!-- Left leg -->
      <path d="M 10 110 L 45 10 L 70 10 L 35 110 Z" fill="url(#apex-grad)" />
      <!-- Right leg with sharp peak cut -->
      <path d="M 45 10 L 100 110 L 75 110 L 38 35 Z" fill="url(#apex-grad)" opacity="0.9" />
      <!-- Crossbar notch / Peak accent -->
      <polygon points="32,68 78,68 68,80 38,80" fill="url(#apex-grad)" />
    </g>

    <!-- Text: PEX -->
    <text x="96" y="105" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
          font-size="92" 
          font-weight="900" 
          letter-spacing="2" 
          fill="url(#apex-grad)">PEX</text>

    <!-- Text: DEVS -->
    <text x="330" y="105" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
          font-size="92" 
          font-weight="300" 
          letter-spacing="4" 
          fill="#F8FAFC">DEVS</text>

    <!-- Sleek Tech Underline Accent -->
    <path d="M 10 128 L 560 128" stroke="url(#accent-line)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="10" cy="128" r="3" fill="#38BDF8"/>
  </g>
</svg>
